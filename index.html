<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GN-Math Direct Loader</title>
</head>
<body>
    <script>
        (function() {
            const url = "https://jsdelivr.net" + Date.now();
            fetch(url)
                .then(r => r.text())
                .then(html => {
                    // Fixes common 'hostname' and 'origin' errors
                    const cleanHtml = html.replace(/new URL\(url, location\.origin\)\.hostname/g, '""');
                    document.open();
                    document.write(cleanHtml);
                    document.close();
                })
                .catch(err => console.error("Failed to load:", err));
        })();
    </script>
</body>
</html>
